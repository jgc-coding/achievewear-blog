<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Platzhalterbild: Herz aus einer Nählinie">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F7F1ED"/>
      <stop offset="1" stop-color="#D8E0D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="180" cy="220" r="160" fill="#EFD9D1" opacity="0.6"/>
  <circle cx="660" cy="840" r="130" fill="#FFFFFF" opacity="0.45"/>
  <!-- Herz als Steppnaht -->
  <path d="M400 700 C 240 580, 155 470, 155 370 C 155 288, 215 232, 292 232 C 347 232, 390 265, 400 310 C 410 265, 453 232, 508 232 C 585 232, 645 288, 645 370 C 645 470, 560 580, 400 700 Z"
        fill="#FFFFFF" opacity="0.5"/>
  <path d="M400 700 C 240 580, 155 470, 155 370 C 155 288, 215 232, 292 232 C 347 232, 390 265, 400 310 C 410 265, 453 232, 508 232 C 585 232, 645 288, 645 370 C 645 470, 560 580, 400 700 Z"
        fill="none" stroke="#5F6F52" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 14"/>
  <!-- Faden läuft aus dem Herz zur Nadel -->
  <path d="M 400 700 C 430 790, 540 800, 590 760 C 640 720, 620 660, 660 640"
        fill="none" stroke="#B98A78" stroke-width="3.5" opacity="0.85"/>
  <!-- Nadel -->
  <g transform="translate(660 640) rotate(38)">
    <rect x="-3" y="-95" width="6" height="120" rx="3" fill="#B98A78"/>
    <ellipse cx="0" cy="-78" rx="5.5" ry="10" fill="#F7F1ED" stroke="#B98A78" stroke-width="3"/>
  </g>
  <!-- kleine Akzente -->
  <circle cx="255" cy="760" r="7" fill="#CDA698"/>
  <circle cx="300" cy="810" r="5" fill="#8A9A7B"/>
  <circle cx="215" cy="820" r="4" fill="#B98A78"/>
</svg>
