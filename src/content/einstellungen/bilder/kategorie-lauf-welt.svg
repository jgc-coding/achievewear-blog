      <stop offset="0" stop-color="#F7F1ED"/>
      <stop offset="1" stop-color="#EFD9D1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="170" cy="200" r="140" fill="#D8E0D4" opacity="0.6"/>
  <circle cx="650" cy="870" r="120" fill="#FFFFFF" opacity="0.5"/>
