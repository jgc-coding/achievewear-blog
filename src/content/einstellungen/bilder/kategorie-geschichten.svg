<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Platzhalterbild Kategorie Geschichten: Weg, der zu einem Herz führt">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F7F1ED"/>
      <stop offset="1" stop-color="#E9DCD4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="630" cy="230" r="160" fill="#EFD9D1" opacity="0.6"/>
  <circle cx="160" cy="810" r="130" fill="#D8E0D4" opacity="0.55"/>
  <!-- aufgeschlagene Seiten -->
  <g transform="translate(400 640)">
    <path d="M -230 40 C -150 -10, -60 -14, 0 12 C 60 -14, 150 -10, 230 40 L 230 150 C 150 100, 60 96, 0 122 C -60 96, -150 100, -230 150 Z"
          fill="#FFFFFF" opacity="0.85"/>
    <path d="M 0 12 L 0 122" stroke="#CDA698" stroke-width="4"/>
    <g stroke="#CDA698" stroke-width="3" opacity="0.7">
      <path d="M -190 52 C -130 18, -60 16, -24 32" fill="none"/>
      <path d="M -190 82 C -130 48, -60 46, -24 62" fill="none"/>
      <path d="M 190 52 C 130 18, 60 16, 24 32" fill="none"/>
      <path d="M 190 82 C 130 48, 60 46, 24 62" fill="none"/>
    </g>
  </g>
  <!-- Weg aus den Seiten hinauf zum Herz -->
  <path d="M 400 652 C 400 560, 320 520, 350 430 C 378 346, 440 330, 420 250"
        fill="none" stroke="#B98A78" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 22"/>
  <path d="M420 240 C 398 220, 387 205, 387 192 C 387 181, 395 174, 405 174 C 411 174, 417 178, 419 184 C 421 178, 427 174, 433 174 C 443 174, 451 181, 451 192 C 451 205, 442 220, 420 240 Z"
        fill="#5F6F52"/>
  <!-- Sternchen -->
  <g fill="#CDA698">
    <path d="M 250 300 l 5 14 l 14 5 l -14 5 l -5 14 l -5 -14 l -14 -5 l 14 -5 Z"/>
    <path d="M 560 470 l 4 11 l 11 4 l -11 4 l -4 11 l -4 -11 l -11 -4 l 11 -4 Z" opacity="0.8"/>
    <path d="M 300 180 l 3 9 l 9 3 l -9 3 l -3 9 l -3 -9 l -9 -3 l 9 -3 Z" opacity="0.7"/>
  </g>
</svg>
