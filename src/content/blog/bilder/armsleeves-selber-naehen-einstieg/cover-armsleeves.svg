<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Platzhalter-Titelbild: zwei Armsleeves mit Stichlinien">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#F7F1ED"/>
      <stop offset="1" stop-color="#D8E0D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="640" cy="180" r="150" fill="#EFD9D1" opacity="0.6"/>
  <!-- zwei Armsleeves -->
  <g transform="translate(300 500) rotate(-18)">
    <rect x="-70" y="-260" width="140" height="520" rx="64" fill="#8A9A7B"/>
    <rect x="-70" y="-260" width="140" height="520" rx="64" fill="none" stroke="#5F6F52" stroke-width="5"/>
    <path d="M -46 -216 C 0 -232, 0 -232, 46 -216" fill="none" stroke="#F7F1ED" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
    <path d="M -46 216 C 0 232, 0 232, 46 216" fill="none" stroke="#F7F1ED" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
    <ellipse cx="34" cy="-186" rx="14" ry="24" fill="#F7F1ED" opacity="0.9"/>
  </g>
  <g transform="translate(520 560) rotate(14)">
    <rect x="-70" y="-260" width="140" height="520" rx="64" fill="#CDA698"/>
    <rect x="-70" y="-260" width="140" height="520" rx="64" fill="none" stroke="#B98A78" stroke-width="5"/>
    <path d="M -46 -216 C 0 -232, 0 -232, 46 -216" fill="none" stroke="#F7F1ED" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
    <path d="M -46 216 C 0 232, 0 232, 46 216" fill="none" stroke="#F7F1ED" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
    <ellipse cx="-34" cy="-186" rx="14" ry="24" fill="#F7F1ED" opacity="0.9"/>
  </g>
  <!-- Maßband-Andeutung -->
  <path d="M 90 880 C 260 830, 480 930, 710 860" fill="none" stroke="#B98A78" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <g stroke="#F7F1ED" stroke-width="3">
    <line x1="170" y1="848" x2="166" y2="866"/>
    <line x1="260" y1="836" x2="258" y2="854"/>
    <line x1="350" y1="844" x2="350" y2="862"/>
    <line x1="440" y1="862" x2="442" y2="880"/>
    <line x1="530" y1="874" x2="534" y2="892"/>
    <line x1="620" y1="872" x2="626" y2="888"/>
  </g>
</svg>
