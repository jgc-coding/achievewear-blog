<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Platzhalter-Titelbild: Wimpelkette und Herz am Streckenrand">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#F7F1ED"/>
      <stop offset="1" stop-color="#EFD9D1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="160" cy="220" r="140" fill="#D8E0D4" opacity="0.6"/>
  <!-- Wimpelkette -->
  <path d="M 40 160 C 240 260, 560 260, 760 150" fill="none" stroke="#5F6F52" stroke-width="5" stroke-linecap="round"/>
  <g>
    <path d="M 120 205 L 175 218 L 132 262 Z" fill="#8A9A7B"/>
    <path d="M 250 244 L 306 250 L 270 298 Z" fill="#CDA698"/>
    <path d="M 385 257 L 441 256 L 413 308 Z" fill="#D8E0D4"/>
    <path d="M 515 246 L 570 236 L 550 290 Z" fill="#B98A78"/>
    <path d="M 636 214 L 688 196 L 678 252 Z" fill="#8A9A7B"/>
  </g>
  <!-- großes Herz (Anfeuern) -->
  <path d="M400 760 C 280 668, 216 585, 216 510 C 216 448, 262 406, 320 406 C 361 406, 393 431, 400 465 C 407 431, 439 406, 480 406 C 538 406, 584 448, 584 510 C 584 585, 520 668, 400 760 Z"
        fill="#B98A78"/>
  <path d="M400 726 C 300 646, 246 574, 246 510 C 246 466, 278 436, 318 436 C 348 436, 372 454, 380 478"
        fill="none" stroke="#F7F1ED" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 16"/>
  <!-- Konfetti -->
  <g>
    <circle cx="190" cy="560" r="9" fill="#8A9A7B"/>
    <circle cx="640" cy="600" r="7" fill="#CDA698"/>
    <circle cx="600" cy="420" r="6" fill="#5F6F52"/>
    <rect x="170" y="700" width="14" height="14" rx="3" fill="#D8E0D4" transform="rotate(24 177 707)"/>
    <rect x="620" y="720" width="12" height="12" rx="3" fill="#EFD9D1" stroke="#CDA698" stroke-width="2" transform="rotate(-18 626 726)"/>
  </g>
  <!-- Strecke unten -->
  <path d="M 60 920 C 280 870, 520 950, 740 890" fill="none" stroke="#8A9A7B" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 24"/>
</svg>
