<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Platzhalter-Titelbild: Herz mit Nählinie und Laufstrecke">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#F7F1ED"/>
      <stop offset="1" stop-color="#E5E9E0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <circle cx="620" cy="800" r="150" fill="#EFD9D1" opacity="0.55"/>
  <circle cx="170" cy="190" r="120" fill="#FFFFFF" opacity="0.5"/>
  <!-- Herz halb genäht, halb Laufstrecke -->
  <path d="M400 680 C 250 566, 170 462, 170 368 C 170 290, 226 238, 298 238 C 350 238, 390 269, 400 312"
        fill="none" stroke="#5F6F52" stroke-width="6" stroke-linecap="round" stroke-dasharray="20 14"/>
  <path d="M400 312 C 410 269, 450 238, 502 238 C 574 238, 630 290, 630 368 C 630 462, 550 566, 400 680 Z"
        fill="none" stroke="#B98A78" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 24"/>
  <!-- Nadel links -->
  <g transform="translate(255 655) rotate(-36)">
    <rect x="-3" y="-80" width="6" height="104" rx="3" fill="#5F6F52"/>
    <ellipse cx="0" cy="-64" rx="5" ry="9" fill="#F7F1ED" stroke="#5F6F52" stroke-width="3"/>
  </g>
  <!-- Zielpunkt rechts -->
  <circle cx="558" cy="620" r="12" fill="#B98A78"/>
  <circle cx="558" cy="620" r="22" fill="none" stroke="#B98A78" stroke-width="3" opacity="0.5"/>
  <!-- kleines inneres Herz -->
  <path d="M400 520 C 356 486, 333 457, 333 431 C 333 410, 348 396, 367 396 C 381 396, 393 404, 400 416 C 407 404, 419 396, 433 396 C 452 396, 467 410, 467 431 C 467 457, 444 486, 400 520 Z"
        fill="#8A9A7B"/>
</svg>
